<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeClaw Mahjong — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Ma+Shan+Zheng&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --felt: #0f6f2f;
    --felt-dark: #0a4f20;
    --tile-front: #f4f0eb;
    --tile-front-side: #eee4d8;
    --tile-back: #f0974c;
    --tile-back-side: #c87a3a;
    --tile-border: #93989c;
    --tile-dark: #1d3954;
    --tile-blue: #3f79b2;
    --gold: #d4af37;
    --panel-bg: #0f1923;
    --text: #e8f4e8;
    --tile-w: 36px;
    --tile-h: 49px;
    --tile-w-sm: 24px;
    --tile-h-sm: 33px;
    --depth: 6px;
    --depth-sm: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body {
    font-family: 'Noto Sans', system-ui, sans-serif;
    background: #0a0e14;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    background: linear-gradient(180deg, #1a2940 0%, var(--tile-dark) 100%);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    border-bottom: 2px solid var(--tile-blue);
    flex-shrink: 0;
  }
  header .logo { font-size: 22px; }
  header .title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 24px;
    color: #d9ebfd;
    letter-spacing: 1px;
  }
  #conn-status { margin-left: auto; font-size: 11px; opacity: 0.7; }
  .conn-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    background: #f44336;
  }
  .conn-dot.on { background: #4caf50; }

  /* ── Main layout ───────────────────────────────── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 260px;
    overflow: hidden;
  }

  /* ── Table (square, centered) ─────────────────── */
  .table-wrap {
    background: var(--felt-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .table-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, var(--felt) 0%, var(--felt-dark) 70%, #061a0e 100%);
  }
  .table {
    position: relative;
    width: min(92vh, 92vw, 700px);
    aspect-ratio: 1;
    z-index: 1;
  }

  /* ── Player panels (absolutely positioned) ────── */
  .player {
    position: absolute;
    background: rgba(0,0,0,0.35);
    border-radius: 10px;
    padding: 8px 10px;
    backdrop-filter: blur(2px);
  }
  .player.south { bottom: 4px; left: 50%; transform: translateX(-50%); width: 85%; }
  .player.north { top: 4px; left: 50%; transform: translateX(-50%); width: 85%; }
  .player.west  { left: 4px; top: 50%; transform: translateY(-50%); max-width: 80px; }
  .player.east  { right: 4px; top: 50%; transform: translateY(-50%); max-width: 80px; }

  .player-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .seat-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    background: var(--tile-blue);
    color: #d9ebfd;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Ma Shan Zheng', cursive;
    border: 2px solid var(--tile-dark);
    box-shadow: 0 2px 0 var(--tile-dark);
    flex-shrink: 0;
  }
  .seat-badge.active-turn {
    background: var(--tile-back);
    border-color: #a06020;
    box-shadow: 0 2px 0 #a06020, 0 0 8px rgba(240,151,76,0.5);
    animation: seat-glow 1.5s infinite;
  }
  @keyframes seat-glow {
    0%,100% { box-shadow: 0 2px 0 #a06020, 0 0 8px rgba(240,151,76,0.3); }
    50% { box-shadow: 0 2px 0 #a06020, 0 0 14px rgba(240,151,76,0.7); }
  }
  .score-badge {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-left: auto;
    font-family: 'Concert One', sans-serif;
  }

  .thinking-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 0.8s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

  /* ── Tiles ─────────────────────────────────────── */
  .tiles-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    align-items: flex-end;
  }

  .tile {
    display: inline-block;
    width: var(--tile-w);
    height: var(--tile-h);
    border: 1px solid var(--tile-border);
    border-radius: 3px;
    background: var(--tile-front);
    position: relative;
    z-index: 2;
    padding-top: var(--depth);
    box-shadow:
      0 calc(var(--depth) * -1) 0 0 var(--tile-front-side),
      0 calc(var(--depth) * -1.6) 0 0 var(--tile-dark);
    line-height: 0;
    font-size: 0;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .tile svg { width: 100%; height: calc(100% - var(--depth)); display: block; }

  .tile.hidden-tile {
    background: var(--tile-back);
    border-color: var(--tile-back-side);
    box-shadow:
      0 calc(var(--depth) * -0.5) 0 0 var(--tile-back-side),
      0 calc(var(--depth) * -1.3) 0 0 #bcbec2;
  }

  .tile.small {
    width: var(--tile-w-sm);
    height: var(--tile-h-sm);
    --depth: var(--depth-sm);
    box-shadow: none;
    padding-top: 0;
  }
  .tile.small svg { height: 100%; }
  .tile.small.hidden-tile { box-shadow: none; }

  .tile.last-discard {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), 0 0 8px rgba(212,175,55,0.5);
    animation: discard-glow 1.5s ease;
  }
  @keyframes discard-glow {
    0% { box-shadow: 0 0 0 2px var(--gold), 0 0 16px rgba(212,175,55,0.8); }
    100% { box-shadow: 0 0 0 1px var(--gold), 0 0 8px rgba(212,175,55,0.5); }
  }

  /* Tile appear animation */
  .tile.anim-appear {
    animation: tile-appear 0.3s ease-out;
  }
  @keyframes tile-appear {
    0% { opacity: 0; transform: translateY(8px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .discard-label {
    font-size: 8px;
    opacity: 0.35;
    margin-top: 5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .discard-row { display: flex; flex-wrap: wrap; gap: 1px; }
  .melds-section { display: flex; gap: 4px; margin-top: 3px; }
  .meld-group {
    display: flex;
    gap: 0px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 1px 2px;
  }

  /* ── Center compass ────────────────────────────── */
  .center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 5;
  }

  .compass {
    width: 90px;
    height: 90px;
    background: #3a3a3a;
    border-radius: 10px;
    position: relative;
    box-shadow: 0 4px 0 #2a2a2a;
  }
  .compass-inner {
    position: absolute;
    inset: 8px;
    background: #1a1a1a;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .compass-wind {
    position: absolute;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 16px;
    color: #888;
    transition: color 0.3s;
  }
  .compass-wind.active {
    color: var(--tile-back);
    text-shadow: 0 0 8px rgba(240,151,76,0.6);
  }
  .compass-wind.top { top: 2px; left: 50%; transform: translateX(-50%); }
  .compass-wind.bottom { bottom: 2px; left: 50%; transform: translateX(-50%); }
  .compass-wind.left { left: 4px; top: 50%; transform: translateY(-50%); }
  .compass-wind.right { right: 4px; top: 50%; transform: translateY(-50%); }

  .compass-tiles-left {
    font-family: 'Concert One', sans-serif;
    font-size: 18px;
    color: white;
    line-height: 1;
  }
  .compass-round {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 12px;
    color: var(--tile-back);
    margin-top: 2px;
  }

  .dora-info {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* ── Discard ponds (center area) ───────────────── */
  .pond {
    position: absolute;
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
  }
  .pond.pond-south {
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: calc(6 * (var(--tile-w-sm) + 1px));
    justify-content: flex-start;
  }
  .pond.pond-north {
    top: 28%;
    left: 50%;
    transform: translateX(-50%) rotate(180deg);
    width: calc(6 * (var(--tile-w-sm) + 1px));
    justify-content: flex-start;
  }
  .pond.pond-west {
    left: 28%;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    width: calc(6 * (var(--tile-w-sm) + 1px));
    justify-content: flex-start;
  }
  .pond.pond-east {
    right: 28%;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    width: calc(6 * (var(--tile-w-sm) + 1px));
    justify-content: flex-start;
  }

  /* ── Log panel ─────────────────────────────────── */
  .log-panel {
    background: var(--panel-bg);
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
  }
  .log-header {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-family: 'Concert One', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }
  .log-entries {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    font-size: 10px;
    font-family: 'Noto Sans', monospace;
  }
  .log-entry {
    padding: 4px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeIn 0.25s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .log-entry .route { color: #64b5f6; font-size: 10px; }
  .log-entry .payload { color: rgba(255,255,255,0.4); font-size: 9px; margin-top: 1px; }
  .log-entry .ts { color: rgba(255,255,255,0.2); font-size: 9px; float: right; }

  /* ── Overlay ───────────────────────────────────── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.7);
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: linear-gradient(135deg, #1a2233 0%, #0f1923 100%);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 32px 52px;
    text-align: center;
    box-shadow: 0 0 60px rgba(212,175,55,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .overlay-card .win {
    font-size: 36px;
    color: var(--gold);
    font-family: 'Ma Shan Zheng', cursive;
    text-shadow: 0 2px 8px rgba(212,175,55,0.3);
  }
  .overlay-card .pts {
    font-size: 20px;
    margin-top: 10px;
    color: #d9ebfd;
    font-family: 'Concert One', sans-serif;
  }
  .overlay-card .yaku {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 10px;
  }
  .overlay-card .win-tiles {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 2px;
  }

  /* ── Lobby state ───────────────────────────────── */
  .lobby-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px 32px;
    text-align: center;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  .lobby-badge .title-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 28px;
    color: var(--gold);
  }
  .lobby-badge .sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 6px; }
  .lobby-badge .seats { margin-top: 12px; display: flex; gap: 8px; justify-content: center; }
  .lobby-seat {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    transition: all 0.3s;
  }
  .lobby-seat.filled {
    border-color: var(--tile-back);
    color: var(--tile-back);
    background: rgba(240,151,76,0.1);
  }

  /* ── Admin control panel ───────────────────────── */
  .admin-panel {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .admin-panel h3 {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 8px;
    font-family: 'Concert One', sans-serif;
    letter-spacing: 0.5px;
  }
  .admin-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans', sans-serif;
  }
  .admin-btn:hover { background: rgba(255,255,255,0.12); }
  .admin-btn.primary {
    background: rgba(76,175,80,0.2);
    border-color: rgba(76,175,80,0.4);
    color: #81c784;
  }
  .admin-btn.primary:hover { background: rgba(76,175,80,0.35); }
  .admin-btn.danger {
    background: rgba(244,67,54,0.15);
    border-color: rgba(244,67,54,0.3);
    color: #e57373;
  }
  .admin-btn.danger:hover { background: rgba(244,67,54,0.3); }
  .admin-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .admin-seats {
    margin: 8px 0;
  }
  .admin-seat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .admin-seat-row .wind { color: var(--gold); width: 16px; font-family: 'Ma Shan Zheng', cursive; }
  .admin-seat-row .name { flex: 1; color: rgba(255,255,255,0.7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .admin-seat-row .kick-btn {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid rgba(244,67,54,0.3);
    background: transparent;
    color: #e57373;
    cursor: pointer;
  }
  .admin-seat-row .kick-btn:hover { background: rgba(244,67,54,0.2); }
  .invite-section { margin-top: 8px; }
  .invite-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
    font-size: 10px;
  }
  .invite-row .addr {
    flex: 1;
    color: rgba(255,255,255,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
  }
  .invite-row .label { color: var(--tile-blue); }
  .invite-row .rm-btn {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
  }
  .invite-input-row {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .invite-input-row input {
    flex: 1;
    padding: 4px 6px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: rgba(0,0,0,0.3);
    color: var(--text);
    font-size: 10px;
    font-family: monospace;
    outline: none;
  }
  .invite-input-row input:focus { border-color: var(--tile-blue); }
  .invite-input-row button {
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 10px;
    cursor: pointer;
  }
  .admin-status {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <span class="logo">🀄</span>
  <span class="title">DeClaw Mahjong</span>
  <span id="conn-status"><span class="conn-dot" id="conn-dot"></span>Connecting...</span>
</header>
<div class="main">
  <div class="table-wrap">
    <div class="table" id="table">
      <!-- North (top) -->
      <div class="player north" id="p-north">
        <div class="player-name">
          <span class="seat-badge" id="badge-north">北</span>
          <span id="nm-north">Waiting...</span>
          <span id="th-north"></span>
          <span class="score-badge" id="sc-north">25,000</span>
        </div>
        <div class="tiles-row" id="hd-north"></div>
        <div class="melds-section" id="ml-north"></div>
      </div>

      <!-- West (left) -->
      <div class="player west" id="p-west">
        <div class="player-name">
          <span class="seat-badge" id="badge-west">西</span>
          <span id="nm-west">...</span>
          <span id="th-west"></span>
        </div>
        <div class="tiles-row" id="hd-west"></div>
        <div class="melds-section" id="ml-west"></div>
      </div>

      <!-- Discard ponds -->
      <div class="pond pond-north" id="pond-north"></div>
      <div class="pond pond-south" id="pond-south"></div>
      <div class="pond pond-west"  id="pond-west"></div>
      <div class="pond pond-east"  id="pond-east"></div>

      <!-- Center: compass -->
      <div class="center">
        <div class="compass">
          <div class="compass-wind top" id="wind-north">北</div>
          <div class="compass-wind bottom" id="wind-south">南</div>
          <div class="compass-wind left" id="wind-west">西</div>
          <div class="compass-wind right" id="wind-east">东</div>
          <div class="compass-inner">
            <div class="compass-tiles-left" id="wall">—</div>
            <div class="compass-round" id="round">E1</div>
          </div>
        </div>
        <div class="dora-info" id="dora"></div>
      </div>

      <!-- East (right) -->
      <div class="player east" id="p-east">
        <div class="player-name">
          <span class="seat-badge" id="badge-east">东</span>
          <span id="nm-east">...</span>
          <span id="th-east"></span>
        </div>
        <div class="tiles-row" id="hd-east"></div>
        <div class="melds-section" id="ml-east"></div>
      </div>

      <!-- South (bottom) -->
      <div class="player south" id="p-south">
        <div class="player-name">
          <span class="seat-badge" id="badge-south">南</span>
          <span id="nm-south">Waiting...</span>
          <span id="th-south"></span>
          <span class="score-badge" id="sc-south">25,000</span>
        </div>
        <div class="tiles-row" id="hd-south"></div>
        <div class="melds-section" id="ml-south"></div>
      </div>

      <!-- Gameover overlay -->
      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <div class="win" id="ov-win"></div>
          <div class="win-tiles" id="ov-tiles"></div>
          <div class="pts" id="ov-pts"></div>
          <div class="yaku" id="ov-yaku"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <!-- Admin control panel -->
    <div class="admin-panel" id="admin-panel">
      <h3>GAME CONTROL</h3>
      <button class="admin-btn primary" id="btn-start" onclick="adminStart()">Start Game</button>
      <button class="admin-btn danger" id="btn-reset" onclick="adminReset()">Reset Room</button>
      <div class="admin-seats" id="admin-seats"></div>
      <div class="admin-status" id="admin-status">Lobby — waiting for players</div>
      <h3 style="margin-top:12px">INVITE LIST</h3>
      <div class="invite-section" id="invite-list"></div>
