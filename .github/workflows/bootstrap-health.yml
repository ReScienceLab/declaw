name: Bootstrap Node Health

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Fetch bootstrap node list
        id: bootstrap
        run: |
          curl -fsSL https://resciencelab.github.io/DAP/bootstrap.json -o bootstrap.json
          cat bootstrap.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          nodes = d['bootstrap_nodes']
          active = [n for n in nodes if n.get('addr')]
          print(f'::notice::Found {len(nodes)} bootstrap nodes ({len(active)} with addr), updated: {d[\"updated\"]}')
          for n in nodes:
              addr = n.get('addr') or '(not configured)'
              port = n.get('httpPort', 8099)
              print(f'{n[\"label\"]}: {addr}:{port}')
          "

      - name: Health check all bootstrap nodes
        run: |
          FAILED=0
          TOTAL=0
          SKIPPED=0

          while IFS= read -r line; do
            ADDR=$(echo "$line" | python3 -c "import json,sys; n=json.loads(sys.stdin.read()); print(n.get('addr') or '')")
            PORT=$(echo "$line" | python3 -c "import json,sys; n=json.loads(sys.stdin.read()); print(n.get('httpPort', 8099))")
            LABEL=$(echo "$line" | python3 -c "import json,sys; n=json.loads(sys.stdin.read()); print(n['label'])")

            echo "--- ${LABEL} ---"

            if [ -z "$ADDR" ]; then
              echo "  - skipped (addr not configured)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            TOTAL=$((TOTAL + 1))

            # Build URL — bracket IPv6 addresses
            if echo "$ADDR" | grep -q ':'; then
              BASE_URL="http://[${ADDR}]:${PORT}"
            else
              BASE_URL="http://${ADDR}:${PORT}"
            fi

            # 1. Ping endpoint
            PING=$(curl -sf --connect-timeout 15 --max-time 20 \
              "${BASE_URL}/peer/ping" 2>/dev/null || echo "FAIL")
            if [ "$PING" = "FAIL" ]; then
              echo "  ✗ /peer/ping — unreachable"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "  ✓ /peer/ping — ${PING}"

            # 2. Peers endpoint
            PEERS=$(curl -sf --connect-timeout 15 --max-time 20 \
              "${BASE_URL}/peer/peers" 2>/dev/null || echo "FAIL")
            if [ "$PEERS" = "FAIL" ]; then
              echo "  ✗ /peer/peers — unreachable"
            else
              COUNT=$(echo "$PEERS" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('peers',[])))" 2>/dev/null || echo "?")
              echo "  ✓ /peer/peers — ${COUNT} peers"
            fi

          done < <(python3 -c "
          import json
          with open('bootstrap.json') as f:
              nodes = json.load(f)['bootstrap_nodes']
          for n in nodes:
              print(json.dumps(n))
          ")

          echo ""
          echo "=== Summary: ${TOTAL} nodes checked, ${FAILED} failed, ${SKIPPED} skipped (addr pending) ==="

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::${FAILED}/${TOTAL} bootstrap nodes unreachable"
          fi

          if [ "$TOTAL" -eq 0 ]; then
            echo "::notice::All bootstrap nodes are pending addr configuration — skipping threshold check"
            exit 0
          fi

          # Fail the workflow if more than half are down
          THRESHOLD=$(( (TOTAL + 1) / 2 ))
          if [ "$FAILED" -ge "$THRESHOLD" ]; then
            echo "::error::${FAILED}/${TOTAL} bootstrap nodes down — exceeds threshold"
            exit 1
          fi
